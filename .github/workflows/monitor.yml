name: Market Funnel Monitor

on:
  schedule:
    # 北京时间周一晚 8:00（UTC 12:00），每周一次
    - cron: "0 12 * * 1"
  workflow_dispatch:
    inputs:
      force_weekly:
        description: "强制发送每周报告 (true/false)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Funnel Monitor
        env:
          SERVER_CHAN_KEY: ${{ secrets.SERVER_CHAN_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          NOTIFY_URL: ${{ secrets.NOTIFY_URL }}
          FORCE_WEEKLY: ${{ github.event.inputs.force_weekly }}
        run: python main.py

      - name: Commit market log (if changed)
        if: success() || failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f market_log.csv ]; then
            git add market_log.csv
            if git diff --cached --quiet; then
              echo "No log changes to commit."
            else
              git commit -m "📊 auto: update market_log.csv [skip ci]"
              git push
            fi
          else
            echo "market_log.csv not found, skipping."
          fi
